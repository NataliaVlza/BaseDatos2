<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fdf6f9;
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 820px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 2px solid #f8d7e3;
        }

        h1 {
            margin: 0 0 25px 0;
            font-size: 26px;
            text-align: center;
            color: #6d597a;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            color: #b56576;
        }

        input[type="number"],
        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e4c1f9;
            font-size: 14px;
            background-color: #faf3ff;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #cdb4db;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .action-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="button"] {
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-blue {
            background-color: #bde0fe;
            color: #355070;
        }

        .btn-blue:hover {
            background-color: #a2d2ff;
        }

        .btn-green {
            background-color: #caffbf;
            color: #386641;
        }

        .btn-green:hover {
            background-color: #b7f7a7;
        }

        .btn-outline {
            background-color: #ffd6e0;
            color: #6d597a;
            font-size: 12px;
            padding: 6px 12px;
        }

        .btn-outline:hover {
            background-color: #ffc8dd;
        }

        #salida {
            background-color: #f1f7ff;
            border: 1px solid #cdb4db;
            padding: 15px;
            height: 320px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script src="./js/functions.js"></script>
</head>

<body>
    <div class="container">
        <h1>Generador de Alumnos</h1>

        <div class="controls">
            <div class="group">
                <label>Registros a generar</label>
                <input type="number" id="registros" value="1" min="1" max="50000">
                <div class="buttons">
                    <input type="button" class="btn-outline" value="Mín (1)" onclick="document.getElementById('registros').value=1;">
                    <input type="button" class="btn-outline" value="Máx (50k)" onclick="document.getElementById('registros').value=50000;">
                </div>
            </div>

            <div class="group">
                <label>Formato de exportación</label>
                <select id="opcion">
                    <option value="1">SQL (MySQL / MariaDB)</option>
                    <option value="2">PostgreSQL</option>
                    <option value="3">Archivo CSV (Excel)</option>
                    <option value="4">Formato JSON</option>
                </select>
            </div>
        </div>

        <div class="action-bar">
            <input type="button" class="btn-blue" value="Generar Datos" onclick="iniciarGeneracionDatos()">
            <input type="button" class="btn-green" value="Guardar Archivo" onclick="exportarDocumentoGenerado()">
        </div>

        <div id="salida">El código generado aparecerá aquí...</div>
    <hr>

<div class="footer">
                    Sanchez Valenzuela Natalia Guadalupe 
</div>
</html>
